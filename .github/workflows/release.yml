name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force release even if version hasn't changed"
        required: false
        default: "false"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from plugin header
        id: version
        run: |
          VERSION=$(grep -oP "Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+" zw-gr26.php)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if tag exists and not forced
        if: steps.tag_check.outputs.exists == 'true' && github.event.inputs.force != 'true'
        run: |
          echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump the version or use force option."
          exit 1

      - name: Tag version
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install production dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader 2>/dev/null || true

      - name: Build release zip
        run: |
          PLUGIN_SLUG="zw-gr26"
          mkdir -p "$PLUGIN_SLUG"
          rsync -av --exclude="$PLUGIN_SLUG" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='phpcs.xml' \
            --exclude='phpstan.neon' \
            --exclude='phpstan-bootstrap.php' \
            --exclude='biome.json' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='*.md' \
            ./ "$PLUGIN_SLUG/"
          zip -r "${PLUGIN_SLUG}-v${{ steps.version.outputs.version }}.zip" "$PLUGIN_SLUG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          files: "zw-gr26-v${{ steps.version.outputs.version }}.zip"
          generate_release_notes: true
